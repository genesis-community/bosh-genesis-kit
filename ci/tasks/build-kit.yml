---
platform: linux

image_resource:
  type: docker-image
  source:
    repository: starkandwayne/concourse

inputs:
- name: version
- name: git
- name: git-ci

outputs:
- name: build

params:
  REPO_ROOT:         git
  BUILD_ROOT:        build
  VERSION_FROM:      version/number
  GENESIS_HONOR_ENV: 1

run:
  path: git-ci/ci/scripts/build-kit

